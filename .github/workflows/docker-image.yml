name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME: easychat

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Keep latest 3 workflow runs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 3;
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100
            });

            const oldRuns = runs
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(keep);

            for (const run of oldRuns) {
              try {
                await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                core.info(`Deleted workflow run ${run.id}: ${run.name} #${run.run_number}`);
              } catch (error) {
                core.warning(`Failed to delete workflow run ${run.id}: ${error.message}`);
              }
            }
