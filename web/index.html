<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EasyChat AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkBg: '#0b0f1a',
            darkCard: '#161e2d'
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s ease; position: relative; user-select: none; -webkit-user-select: none; }
    input, textarea { user-select: text; -webkit-user-select: text; }
    .chat-select, .chat-select * { user-select: text; -webkit-user-select: text; }
    #dynamic-bg { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; transition: background-image 0.5s ease-in-out; filter: brightness(0.95); }
    .dark #dynamic-bg { filter: brightness(0.35); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .typing::after { content: '▋'; animation: blink 1s infinite; color: #3b82f6; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .sidebar-transition { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .oops-gradient { background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899, #f43f5e); background-size: 200% 200%; animation: gradient-move 5s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @keyframes gradient-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @media (min-width: 641px) { .sidebar-width { width: 400px; } }
    @media (max-width: 640px) { .sidebar-width { width: 88%; } }
    .footer-clear { background: linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 100%); }
    .dark .footer-clear { background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%); }
    .prose pre { border-radius: 16px; padding: 1rem; overflow-x: auto; }
    .prose code:not(pre code) { padding: 0.2rem 0.4rem; border-radius: 0.4rem; background: rgba(148, 163, 184, 0.15); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 overflow-hidden">
  <div id="dynamic-bg"></div>

  <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

  <aside id="sidebar" class="fixed left-0 top-0 h-full sidebar-width bg-white/95 dark:bg-darkCard/95 backdrop-blur-xl border-r dark:border-slate-800 z-50 -translate-x-full sidebar-transition shadow-2xl flex flex-col">
    <div class="p-8 h-full flex flex-col overflow-y-auto no-scrollbar gap-6">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold tracking-tight">Settings</h2>
        <div id="test-indicator" class="w-3 h-3 rounded-full bg-slate-200 dark:bg-slate-700 shadow-sm transition-all duration-300"></div>
      </div>

      <section class="space-y-3">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">API Presets</label>
          <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="preset-tabs"></div>
        </div>
        <div class="p-4 rounded-2xl bg-slate-50/70 dark:bg-slate-900/50 border dark:border-slate-800">
          <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Current Model</div>
          <div id="current-model" class="text-sm font-semibold text-blue-500">-</div>
        </div>
        <button onclick="testConnection()" id="test-btn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition active:scale-[0.98] text-sm shadow-lg shadow-blue-500/20">
          测试当前预设
        </button>
        <div id="status-box" class="hidden text-xs rounded-2xl p-4 border"></div>
      </section>

      <section class="space-y-3 border-t dark:border-slate-800 pt-6">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Admin Config</div>
            <div class="text-xs text-slate-400 mt-1">输入管理密码后可在线维护 API、模型和背景图</div>
          </div>
        </div>

        <input id="admin-password" type="password" placeholder="Admin Password" class="w-full p-3 bg-slate-50/50 dark:bg-slate-900/50 border dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">

        <div class="grid grid-cols-2 gap-2">
          <button onclick="loadAdminConfig()" class="py-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition text-xs font-semibold">加载配置</button>
          <button onclick="saveAdminConfig()" class="py-3 bg-violet-600 text-white rounded-xl hover:bg-violet-700 transition text-xs font-semibold">保存配置</button>
        </div>

        <div id="admin-panel" class="hidden space-y-3">
          <input id="app-name-input" type="text" placeholder="App Name" class="w-full p-3 bg-slate-50/50 dark:bg-slate-900/50 border dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
          <input id="background-image-input" type="text" placeholder="Background Image URL" class="w-full p-3 bg-slate-50/50 dark:bg-slate-900/50 border dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">

          <div class="flex items-center justify-between">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Preset Editor</label>
            <button onclick="addAdminPreset()" class="text-blue-500 text-xs font-bold hover:underline">+ Add Preset</button>
          </div>

          <div id="admin-presets" class="space-y-3"></div>
        </div>
      </section>

      <section class="border-t dark:border-slate-800 pt-6">
        <div class="flex items-center justify-between mb-4">
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">History</span>
          <button onclick="createNewChat()" class="text-blue-500 text-xs font-bold hover:underline">+ New Chat</button>
        </div>
        <div id="history-list" class="space-y-2"></div>
      </section>

      <div class="mt-auto pt-6 border-t dark:border-slate-800 flex gap-3">
        <button onclick="toggleDarkMode()" class="flex-1 py-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition text-xs font-semibold">🌓 模式</button>
        <button onclick="clearAllData()" class="flex-1 py-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:text-red-500 transition text-xs font-semibold">🗑️ 清空历史</button>
      </div>
    </div>
  </aside>

  <div class="h-screen flex flex-col w-full relative">
    <button id="gear-btn" onclick="toggleSidebar()" class="fixed top-5 left-5 p-3.5 bg-white/60 dark:bg-darkCard/60 backdrop-blur-md border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl z-30 hover:scale-110 transition-all active:scale-95 group">
      <svg class="w-6 h-6 text-slate-600 dark:text-slate-300 group-hover:rotate-90 transition-transform duration-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </button>

    <main id="chat-box" class="flex-1 overflow-y-auto no-scrollbar pt-10 pb-36">
      <div class="max-w-4xl mx-auto px-6 space-y-12">
        <div id="welcome-view" class="text-center pt-0 pb-6">
          <h1 id="app-title" class="text-7xl font-black mb-4 tracking-tighter italic oops-gradient">EasyChat</h1>
          <p class="text-slate-400 dark:text-slate-600 text-sm font-medium tracking-widest uppercase">Intelligent Terminal</p>
        </div>
      </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full pb-8 pt-4 footer-clear">
      <div class="max-w-4xl mx-auto px-6">
        <div class="relative bg-white/70 dark:bg-darkCard/70 backdrop-blur-md rounded-[30px] p-2 shadow-2xl border border-white/20 dark:border-slate-800 focus-within:ring-2 focus-within:ring-blue-500 transition-all duration-300">
          <div class="flex items-center justify-end gap-2 px-3 pt-2 pb-1">
            <button onclick="clearImageUrl()" class="text-[10px] text-slate-400 hover:text-red-500 transition">清除图片</button>
          </div>
          <div id="image-preview-wrap" class="hidden px-3 pb-2">
            <img id="image-preview" alt="pasted-image-preview" class="max-h-28 rounded-lg border border-slate-200 dark:border-slate-700" />
          </div>
          <div class="flex items-end gap-2">
            <textarea id="user-input" rows="1" class="flex-1 bg-transparent px-4 py-3 outline-none resize-none max-h-40 text-slate-700 dark:text-slate-200" placeholder="Ask anything..."></textarea>
            <button id="image-btn" class="p-4 bg-violet-600 text-white rounded-full hover:bg-violet-700 shadow-lg shadow-violet-500/30 active:scale-90 transition-all" title="根据输入框提示词生成图片">
              <span class="text-lg leading-none">🎨</span>
            </button>
            <button id="stop-btn" class="hidden p-4 bg-slate-700 text-white rounded-full hover:bg-slate-800 transition-all">■</button>
            <button id="send-btn" class="p-4 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-lg shadow-blue-500/30 active:scale-90 transition-all">
              <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M2.3 20.27L22.18 12 2.3 3.73a.75.75 0 0 0-1.04.88L4.35 12l-3.1 7.39a.75.75 0 0 0 1.05.88z"/></svg>
            </button>
          </div>
        </div>
        <div id="loading-tag" class="hidden mt-2 text-center text-[10px] font-bold text-blue-500 tracking-[0.2em] uppercase animate-pulse">Assistant is typing</div>
      </div>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
